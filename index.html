<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drift - Sleep Content Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital@0;1&family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #a29bfe;
            --text-primary: #e8e8f0;
            --text-secondary: #b8b8c8;
            --border: #2d2d4a;
            --success: #6c5ce7;
        }

        html, body {
            height: 100%;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Left Panel - Input */
        .input-panel {
            width: 35%;
            padding: 2rem;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: linear-gradient(180deg, rgba(26, 26, 46, 0.8) 0%, rgba(22, 33, 62, 0.6) 100%);
            backdrop-filter: blur(10px);
        }

        .header {
            margin-bottom: 2rem;
        }

        .logo {
            font-family: 'Crimson Text', serif;
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent) 0%, var(--success) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 0.85rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.7rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.9rem;
            background: rgba(45, 45, 74, 0.5);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            background: rgba(45, 45, 74, 0.8);
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(162, 155, 254, 0.1);
        }

.duration-slider {
            margin-top: 0.5rem;
        }

        .duration-slider input {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: linear-gradient(to right, var(--accent) 0%, var(--success) 100%);
            border-radius: 2px;
            outline: none;
        }

        .duration-slider input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(162, 155, 254, 0.3);
        }

        .duration-slider input::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(162, 155, 254, 0.3);
        }

        .duration-value {
            text-align: right;
            font-size: 0.85rem;
            color: var(--accent);
            margin-top: 0.5rem;
        }

        .prompt-wrapper {
            position: relative;
        }

        .suggestions-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(22, 33, 62, 0.95);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 6px 6px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .suggestion-item {
            padding: 0.9rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            background: rgba(162, 155, 254, 0.1);
            color: var(--accent);
            padding-left: 1.2rem;
        }

        .suggestion-item strong {
            color: var(--accent);
            font-weight: 500;
        }

        .suggestions-dropdown.hidden {
            display: none;
        }

        .generate-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--success) 0%, var(--accent) 100%);
            color: var(--primary);
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: auto;
        }

        .generate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.3);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Right Panel - Output */
        .output-panel {
            flex: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%);
            position: relative;
        }

        .output-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(162, 155, 254, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .output-header {
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .output-title {
            font-family: 'Crimson Text', serif;
            font-size: 1.8rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            min-height: 2.2rem;
        }

        .output-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .content-display {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            background: rgba(45, 45, 74, 0.2);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .content-display::-webkit-scrollbar {
            width: 6px;
        }

        .content-display::-webkit-scrollbar-track {
            background: transparent;
        }

        .content-display::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .content-display::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        .content-text {
            font-family: 'Crimson Text', serif;
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-primary);
            letter-spacing: 0.3px;
            white-space: pre-wrap;
        }

        .voice-tag {
            display: inline-block;
            background: rgba(108, 92, 231, 0.15);
            color: var(--success);
            padding: 0.2rem 0.6rem;
            border-radius: 3px;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            margin: 0.3rem 0;
            border-left: 2px solid var(--success);
        }

        .sfx-tag {
            display: inline-block;
            background: rgba(162, 155, 254, 0.15);
            color: var(--accent);
            padding: 0.2rem 0.6rem;
            border-radius: 3px;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            margin: 0.3rem 0;
            border-left: 2px solid var(--accent);
        }

        .dialogue-line {
            margin-left: 1rem;
            border-left: 3px solid rgba(162, 155, 254, 0.3);
            padding-left: 0.8rem;
        }

        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            flex-direction: column;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            flex-direction: column;
            color: var(--text-secondary);
            text-align: center;
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            position: relative;
            z-index: 1;
        }

        .action-btn {
            flex: 1;
            padding: 0.8rem;
            background: rgba(45, 45, 74, 0.5);
            border: 1px solid var(--border);
            color: var(--accent);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .action-btn:hover {
            background: rgba(162, 155, 254, 0.1);
            border-color: var(--accent);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
            }

            .input-panel {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                max-height: 40vh;
                overflow-y: auto;
            }

            .output-panel {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Input Panel -->
        <div class="input-panel">
            <div class="header">
                <div class="logo">DRIFT</div>
                <div class="tagline">Sleep Content Generator</div>
            </div>

            <div class="form-group">
                <label>What would you like?</label>
                <div class="prompt-wrapper">
                    <textarea id="customPrompt" placeholder="Book of Proverbs, ancient wisdom, mythology, nature meditation, philosophy... anything you want to hear about"></textarea>
                    <div class="suggestions-dropdown hidden" id="suggestionsDropdown"></div>
                </div>
            </div>

            <div class="form-group">
                <label>Content Style</label>
                <select id="style">
                    <option value="storytelling-voices">Storytelling with Voices & SFX</option>
                    <option value="storytelling">Narrative Storytelling</option>
                    <option value="meditative">Meditative</option>
                    <option value="educational">Educational</option>
                    <option value="poetic">Poetic</option>
                </select>
            </div>

            <div class="form-group">
                <label>Desired Length: <span id="durationText">5 minutes</span></label>
                <div class="duration-slider">
                    <input type="range" id="duration" min="3" max="15" value="5">
                </div>
                <div class="duration-value">~<span id="wordCount">2500</span> words</div>
            </div>

            <button class="generate-btn" id="generateBtn">Generate Content</button>
        </div>

        <!-- Output Panel -->
        <div class="output-panel">
            <div class="output-header">
                <div class="output-title" id="outputTitle">Your sleep journey awaits</div>
                <div class="output-meta" id="outputMeta"></div>
            </div>

            <div class="content-display" id="contentDisplay">
                <div class="empty-state">
                    <div class="empty-icon">✨</div>
                    <p>Select a theme and tap Generate to begin</p>
                </div>
            </div>

            <div class="action-buttons">
                <button class="action-btn" id="copyBtn" disabled>Copy</button>
                <button class="action-btn" id="downloadBtn" disabled>Download</button>
                <button class="action-btn" id="regenerateBtn" disabled>Regenerate</button>
            </div>
        </div>
    </div>

    <script>
        const state = {
            currentContent: '',
            isGenerating: false
        };

        const suggestions = {
            biblical: [
                'Book of Proverbs - ancient wisdom and reflection',
                'Psalms - meditative prayer and contemplation',
                'Song of Solomon - poetic love and longing',
                'Book of Job - journey through suffering and faith',
                'Ecclesiastes - reflections on meaning and time'
            ],
            mythology: [
                'Greek mythology - tales of gods and heroes',
                'Norse mythology - stories of Asgard and Midgard',
                'Egyptian mythology - journey through the afterlife',
                'Celtic mythology - ancient tales and legends',
                'Hindu mythology - epics and sacred stories'
            ],
            philosophical: [
                'Stoic philosophy - virtue and acceptance',
                'Buddhist teachings - mindfulness and peace',
                'Taoist wisdom - flowing with nature',
                'Epicureanism - simple pleasures and contentment',
                'Existentialism - freedom and meaning'
            ],
            nature: [
                'Ocean meditation - tides and waves',
                'Forest walk - ancient trees and stillness',
                'Mountain journey - peaks and valleys',
                'Desert contemplation - sand and stars',
                'Night sky - constellations and cosmic wonder'
            ],
            historical: [
                'Ancient Rome - emperors and philosophy',
                'Medieval monasteries - quiet contemplation',
                'Renaissance wisdom - art and discovery',
                'Victorian exploration - distant lands',
                'Ancient China - Confucian teachings'
            ]
        };

        const elements = {
            customPrompt: document.getElementById('customPrompt'),
            suggestionsDropdown: document.getElementById('suggestionsDropdown'),
            style: document.getElementById('style'),
            duration: document.getElementById('duration'),
            durationText: document.getElementById('durationText'),
            wordCount: document.getElementById('wordCount'),
            generateBtn: document.getElementById('generateBtn'),
            contentDisplay: document.getElementById('contentDisplay'),
            outputTitle: document.getElementById('outputTitle'),
            outputMeta: document.getElementById('outputMeta'),
            copyBtn: document.getElementById('copyBtn'),
            downloadBtn: document.getElementById('downloadBtn'),
            regenerateBtn: document.getElementById('regenerateBtn')
        };

        // Duration slider
        elements.duration.addEventListener('input', (e) => {
            const mins = e.target.value;
            elements.durationText.textContent = `${mins} minutes`;
            const words = Math.round(mins * 500);
            elements.wordCount.textContent = words;
        });

        // Autocomplete suggestions
        function getAllSuggestions() {
            const all = [];
            Object.values(suggestions).forEach(category => {
                all.push(...category);
            });
            return all;
        }

        function filterSuggestions(input) {
            if (!input.trim()) {
                return [];
            }
            const lower = input.toLowerCase();
            return getAllSuggestions().filter(s => 
                s.toLowerCase().includes(lower)
            ).slice(0, 5);
        }

        function renderSuggestions(filtered) {
            if (filtered.length === 0) {
                elements.suggestionsDropdown.classList.add('hidden');
                return;
            }

            elements.suggestionsDropdown.innerHTML = filtered.map(s => `
                <div class="suggestion-item">${s}</div>
            `).join('');

            elements.suggestionsDropdown.classList.remove('hidden');

            // Add click handlers
            document.querySelectorAll('.suggestion-item').forEach(item => {
                item.addEventListener('click', () => {
                    elements.customPrompt.value = item.textContent;
                    elements.suggestionsDropdown.classList.add('hidden');
                    elements.customPrompt.focus();
                });
            });
        }

        elements.customPrompt.addEventListener('input', (e) => {
            const filtered = filterSuggestions(e.target.value);
            renderSuggestions(filtered);
        });

        elements.customPrompt.addEventListener('focus', () => {
            const filtered = filterSuggestions(elements.customPrompt.value);
            if (filtered.length > 0) {
                renderSuggestions(filtered);
            } else if (!elements.customPrompt.value) {
                // Show all suggestions if empty
                const allSuggestions = getAllSuggestions();
                elements.suggestionsDropdown.innerHTML = allSuggestions.slice(0, 8).map(s => `
                    <div class="suggestion-item">${s}</div>
                `).join('');
                elements.suggestionsDropdown.classList.remove('hidden');

                document.querySelectorAll('.suggestion-item').forEach(item => {
                    item.addEventListener('click', () => {
                        elements.customPrompt.value = item.textContent;
                        elements.suggestionsDropdown.classList.add('hidden');
                        elements.customPrompt.focus();
                    });
                });
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.prompt-wrapper')) {
                elements.suggestionsDropdown.classList.add('hidden');
            }
        });

        // Generate content
        elements.generateBtn.addEventListener('click', generateContent);

        async function generateContent() {
            if (state.isGenerating) return;
            
            const userPrompt = elements.customPrompt.value.trim();
            if (!userPrompt) {
                alert('Tell me what you want to hear about');
                return;
            }
            
            state.isGenerating = true;
            elements.generateBtn.disabled = true;

            // Show loading state
            elements.contentDisplay.innerHTML = `
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <div class="spinner-text">Crafting your content...</div>
                </div>
            `;

            try {
                const styleDescriptions = {
                    'storytelling-voices': `narrative form with distinct character voices marked with [VOICE: Character Name] tags, ambient sound effects marked with [SFX: effect description], and dialogue between characters. Use multiple perspectives and character interactions to bring the story alive. Include natural pauses and emotional beats.`,
                    'storytelling': 'narrative form with a clear beginning, middle, and end',
                    'meditative': 'flowing, poetic language with gentle pacing and breathing pauses',
                    'educational': 'informative yet calming, with interesting facts and insights',
                    'poetic': 'lyrical and rhythmic, using metaphor and imagery'
                };
                
                const duration = parseInt(elements.duration.value);
                const style = elements.style.value;

                const prompt = `You are a sleep content creator specializing in calming, contemplative audio for rest and meditation.

Create original sleep content with these specifications:
- Topic: ${userPrompt}
- Style: ${styleDescriptions[style]}
- Approximate length: ${duration} minutes (around ${Math.round(duration * 500)} words)
- Target audience: Adults seeking rest and calm before sleep
- Tone: Gentle, unhurried, contemplative, never jarring or suddenly dramatic
- Include: Natural pauses, metaphor, sensory details that soothe

Write the content in a flowing, readable format. Make it something someone would love reading as they drift off to sleep.`;

                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: Math.round(duration * 600),
                        messages: [
                            { role: 'user', content: prompt }
                        ]
                    })
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                state.currentContent = data.content[0].text;

                // Display content
                displayContent();
                elements.copyBtn.disabled = false;
                elements.downloadBtn.disabled = false;
                elements.regenerateBtn.disabled = false;

            } catch (error) {
                elements.contentDisplay.innerHTML = `
                    <div class="empty-state">
                        <div style="margin-bottom: 1rem; color: #f8576b;">⚠</div>
                        <p>Unable to generate content. Please ensure you're using a valid API key or check your connection.</p>
                        <p style="font-size: 0.8rem; margin-top: 1rem; color: var(--text-secondary);">${error.message}</p>
                    </div>
                `;
            } finally {
                state.isGenerating = false;
                elements.generateBtn.disabled = false;
            }
        }

        function displayContent() {
            const userPrompt = elements.customPrompt.value.trim();
            elements.outputTitle.textContent = userPrompt;
            elements.outputMeta.textContent = `Generated • ${elements.duration.value} minute reading`;
            
            let formattedContent = state.currentContent;
            
            // Parse and format voice tags
            formattedContent = formattedContent.replace(
                /\[VOICE:\s*([^\]]+)\]/g,
                '<span class="voice-tag">🎙 $1</span>'
            );
            
            // Parse and format sound effect tags
            formattedContent = formattedContent.replace(
                /\[SFX:\s*([^\]]+)\]/g,
                '<span class="sfx-tag">🔊 $1</span>'
            );
            
            // Format dialogue lines (lines that come after voice tags)
            const lines = formattedContent.split('\n');
            formattedContent = lines.map((line, i) => {
                if (line.includes('<span class="voice-tag">')) {
                    return line;
                }
                if (i > 0 && lines[i-1].includes('<span class="voice-tag">') && line.trim()) {
                    return `<div class="dialogue-line">${line}</div>`;
                }
                return line;
            }).join('\n');
            
            elements.contentDisplay.innerHTML = `<div class="content-text">${formattedContent}</div>`;
        }

        // Copy button
        elements.copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(state.currentContent).then(() => {
                const btn = elements.copyBtn;
                const original = btn.textContent;
                btn.textContent = 'Copied!';
                setTimeout(() => { btn.textContent = original; }, 2000);
            });
        });

        // Download button
        elements.downloadBtn.addEventListener('click', () => {
            const element = document.createElement('a');
            const file = new Blob([state.currentContent], {type: 'text/plain'});
            element.href = URL.createObjectURL(file);
            element.download = `drift-${state.currentTheme}-${Date.now()}.txt`;
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        });

        // Regenerate button
        elements.regenerateBtn.addEventListener('click', generateContent);
    </script>
</body>
</html>
